# DEPRECATED: This workflow is kept for manual/emergency releases only.
# For automated releases, use release.yml which runs semantic-release.
#
# To use this workflow manually:
# 1. Create a GitHub release manually in the UI
# 2. This workflow will trigger and publish to npm
#
# For normal releases, just push to main/master with conventional commits
# and semantic-release will handle versioning and publishing automatically.

name: Publish to npm (Manual)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "confirm" to proceed with manual publish'
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.confirm == 'confirm'
    steps:
      - name: Validation passed
        run: echo "Manual publish confirmed"

  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
